spec_version: 1
name: email-triage-env
type: environment
runtime: docker
app: server/app.py
port: 7860

tasks:
  - id: task1_classification
    name: "Email Classification"
    description: "Classify the given email as spam, important, or support"
    seed: 42
    grader: graders/grader1_classification.py

  - id: task2_intent
    name: "Email Intent Detection"
    description: "Identify the intent of the email: pricing inquiry, complaint, booking, or promotion"
    seed: 42
    grader: graders/grader2_intent.py

  - id: task3_full_triage
    name: "Full Email Triage Pipeline"
    description: "Complete all three stages: classify, detect intent, and draft a reply"
    seed: 42
    grader: graders/grader3_full_triage.py
